<html>

<head>
  <meta name="color-scheme" content="light dark">
</head>

<body cz-shortcut-listen="true">
  <pre style="word-wrap: break-word; white-space: pre-wrap;">static.bottleneck.cc</pre>
  <pre style="word-wrap: break-word; white-space: pre-wrap;">maybe you wanted to visit readme.bottleneck.cc</pre>
  <pre style="word-wrap: break-word; white-space: pre-wrap;"> </pre>
  <pre id="tokenDisplay"
    style="word-wrap: break-word; white-space: pre-wrap; color: rgb(114, 243, 255); cursor: pointer;"
    onclick="generateToken()">generate token</pre>
  <script>
    function generateToken() {
      const token = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2) + Date.now().toString(36);
      document.getElementById('tokenDisplay').innerText = token;
    }
  </script>
</body>

</html>
